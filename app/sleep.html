<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>睡眠记录 - 偏头痛记录应用</title>
    <!-- 引入外部样式 -->
    <link rel="stylesheet" href="styles.css">
    <!-- 引入Chart.js用于图表绘制 -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        /* 睡眠记录页面优化配色样式 */
        :root {
            --comfort-bg: #1a1e2a;
            --card-bg: rgba(32, 38, 54, 0.85);
            --card-border: rgba(65, 105, 225, 0.4);
            --text-primary: #f8f9fa;
            --text-secondary: #e2e8f0;
            --text-muted: #a0aec0;
            --form-bg: rgba(45, 55, 72, 0.7);
            --accent-blue-soft: #6495ed;
        }
        
        /* 调整全局背景 */
        body {
            background: var(--comfort-bg);
            background-image: linear-gradient(135deg, rgba(65, 105, 225, 0.1) 0%, rgba(0, 0, 0, 0) 100%);
        }
        
        .sleep-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .glass-card {
            background: var(--card-bg);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--card-border);
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
            border-color: rgba(65, 105, 225, 0.5);
        }
        
        .glass-card h2 {
            color: var(--accent-blue-soft);
            font-size: 1.8rem;
            margin-bottom: 1.5rem;
            text-align: center;
            position: relative;
            padding-bottom: 0.5rem;
            font-weight: 600;
        }
        
        .glass-card h2::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-blue-soft), transparent);
            border-radius: 2px;
        }
        
        /* 表单样式 */
        .sleep-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            color: var(--text-primary);
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
            font-weight: 500;
        }
        
        .form-group input,
        .form-group select {
            padding: 0.8rem 1rem;
            background: var(--form-bg);
            border: 1px solid rgba(101, 115, 255, 0.2);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-blue-soft);
            background: rgba(45, 55, 72, 0.9);
            box-shadow: 0 0 0 3px rgba(65, 105, 225, 0.15);
        }
        
        /* 提高表单元素可读性 */
        .form-group input::placeholder {
            color: var(--text-muted);
        }
        
        .submit-btn {
            grid-column: 1 / -1;
            padding: 1rem;
            background: linear-gradient(90deg, var(--accent-blue-soft), rgba(65, 105, 225, 0.7));
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 12px rgba(65, 105, 225, 0.2);
        }
        
        .submit-btn:hover {
            background: linear-gradient(90deg, #4169e1, rgba(65, 105, 225, 0.8));
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(65, 105, 225, 0.4);
          }
        
        .sleep-duration {
            padding: 1rem;
            background: var(--form-bg);
            border-radius: 8px;
            text-align: center;
            font-size: 1.5rem;
            color: var(--accent-blue-soft);
            font-weight: 600;
            margin-top: 1rem;
            border: 1px solid rgba(65, 105, 225, 0.1);
        }
        
        /* 图表容器样式 */
        .charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
        }
        
        .chart-container {
            height: 300px;
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            padding: 1rem;
        }
        
        /* 睡眠记录列表样式 */
        .sleep-records {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
            font-size: 1rem;
        }
        
        .sleep-records th,
        .sleep-records td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(65, 105, 225, 0.1);
        }
        
        .sleep-records th {
            color: var(--accent-blue-soft);
            font-weight: 600;
            background: rgba(65, 105, 225, 0.05);
            position: sticky;
            top: 0;
            backdrop-filter: blur(5px);
        }
        
        .sleep-records td {
            color: var(--text-secondary);
            font-weight: 400;
        }
        
        .sleep-records tr:hover {
            background: rgba(65, 105, 225, 0.05);
        }
        
        /* 质量指示器样式 - 使用更柔和的颜色 */
        .quality-indicator {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            border: 1px solid transparent;
        }
        
        .quality-excellent {
            background: rgba(46, 204, 113, 0.2);
            color: #55efc4;
            border-color: rgba(46, 204, 113, 0.3);
        }
        
        .quality-good {
            background: rgba(52, 152, 219, 0.2);
            color: #74b9ff;
            border-color: rgba(52, 152, 219, 0.3);
        }
        
        .quality-fair {
            background: rgba(241, 196, 15, 0.2);
            color: #ffeaa7;
            border-color: rgba(241, 196, 15, 0.3);
        }
        
        .quality-poor {
            background: rgba(231, 76, 60, 0.2);
            color: #ff7675;
            border-color: rgba(231, 76, 60, 0.3);
        }
        
        /* 空状态提示优化 */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
            border: 1px dashed rgba(65, 105, 225, 0.2);
        }
        
        /* 导航链接样式 */
        .navigation-links {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1rem 0;
        }
        
        .nav-link {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 1rem;
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
        }
        
        .nav-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(65, 105, 225, 0.1), transparent);
            transition: all 0.5s ease;
        }
        
        .nav-link:hover {
            color: var(--accent-blue-soft);
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(65, 105, 225, 0.3);
            box-shadow: 0 4px 12px rgba(65, 105, 225, 0.15);
        }
        
        .nav-link:hover::before {
            left: 100%;
        }
        
        .nav-link:active {
            transform: translateY(0);
            box-shadow: 0 2px 6px rgba(65, 105, 225, 0.1);
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            .sleep-container {
                padding: 1rem;
            }
            
            .glass-card {
                padding: 1.5rem;
            }
            
            .sleep-form {
                grid-template-columns: 1fr;
            }
            
            .charts-container {
                grid-template-columns: 1fr;
            }
            
            .chart-container {
                height: 250px;
                padding: 0.5rem;
            }
            
            .sleep-records {
                font-size: 0.9rem;
            }
            
            .sleep-records th,
            .sleep-records td {
                padding: 0.7rem 0.5rem;
            }
            
            .glass-card h2 {
                font-size: 1.5rem;
            }
        }
        
        /* 平滑滚动和过渡效果 */
        html {
            scroll-behavior: smooth;
        }
        
        /* 焦点可见性优化 */
        *:focus-visible {
            outline: 2px solid var(--accent-blue-soft);
            outline-offset: 2px;
        }
        
        /* 玻璃容器样式，确保与container一致 */
        .glass-container {
            width: 100%;
            max-width: 1200px;
            padding: 0 1rem;
            margin: 0 auto;
        }
        

        

        

        

        

        
        /* 底部图标导航栏样式 - 类似小红书风格 */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 0.5rem 0 1rem;
            background: rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
        }
        
        /* 导航链接样式 */
        .navigation-links {
            display: flex;
            justify-content: space-around;
            align-items: flex-end;
            gap: 0.5rem;
            margin: 0;
            padding: 0;
            width: 100%;
        }
        
        /* 导航链接样式 */
        .nav-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.3s ease;
            font-size: 0.8rem;
            flex: 1;
            max-width: 60px;
        }
        
        /* 导航图标样式 */
        .nav-icon {
            font-size: 1.5rem;
            margin-bottom: 0.3rem;
        }
        
        /* 中间突出的日历按钮 */
        .nav-link.calendar-btn {
            position: relative;
            top: -1.5rem;
            background: var(--accent-blue-soft);
            border-radius: 50%;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(65, 105, 225, 0.4);
            transition: all 0.3s ease;
        }
        
        .nav-link.calendar-btn .nav-icon {
            font-size: 2rem;
            margin-bottom: 0;
            color: white;
        }
        
        .nav-link.calendar-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 6px 16px rgba(65, 105, 225, 0.5);
        }
        
        .nav-link:hover:not(.calendar-btn) {
            color: var(--accent-blue-soft);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
        <div class="glass-container">
            <header class="header">
                <div class="header-content">
                    <h1 data-text="睡眠记录">睡眠记录</h1>
                    <div class="user-auth-section">
                        <div id="userStatus" class="user-status" style="display: none;">
                            <span id="usernameDisplay"></span>
                            <button id="logoutBtn" class="logout-btn">退出登录</button>
                        </div>
                        <div id="authBtns" class="auth-buttons">
                            <button id="loginBtn" class="auth-btn">登录</button>
                            <button id="registerBtn" class="auth-btn">注册</button>
                        </div>
                    </div>
                </div>
            </header>
        
        <main class="sleep-container">
            <!-- 睡眠记录表单 -->
            <section class="glass-card">
                <h2>记录睡眠数据</h2>
                <form id="sleepForm" class="sleep-form">
                    <div class="form-group">
                        <label for="date">记录日期</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label for="sleepTime">入睡时间</label>
                        <input type="time" id="sleepTime" required>
                    </div>
                    <div class="form-group">
                        <label for="wakeTime">起床时间</label>
                        <input type="time" id="wakeTime" required>
                    </div>
                    <div class="form-group">
                        <label for="quality">睡眠质量</label>
                        <select id="quality" required>
                            <option value="excellent">优秀</option>
                            <option value="good">良好</option>
                            <option value="fair">一般</option>
                            <option value="poor">较差</option>
                        </select>
                    </div>
                    <div class="sleep-duration" id="sleepDuration">
                        睡眠时长: <span id="durationValue">--:--</span>
                    </div>
                    <button type="submit" class="submit-btn">保存记录</button>
                </form>
            </section>
            
            <!-- 数据可视化图表 -->
            <section class="glass-card">
                <h2>睡眠数据分析</h2>
                <div class="charts-container">
                    <div class="chart-container">
                        <canvas id="sleepDurationChart"></canvas>
                    </div>
                    <div class="chart-container">
                        <canvas id="sleepQualityChart"></canvas>
                    </div>
                    <div class="chart-container">
                        <canvas id="sleepWakeChart"></canvas>
                    </div>
                </div>
            </section>
            
            <!-- 睡眠记录列表 -->
            <section class="glass-card">
                <h2>历史记录</h2>
                <div id="noSleepRecords" class="empty-state" style="text-align: center; padding: 2rem; color: #888;">
                    <p>暂无睡眠记录</p>
                    <p style="font-size: 1rem; margin-top: 1rem;">记录您的睡眠数据后，将在此处显示</p>
                </div>
                <table class="sleep-records" id="sleepRecordsTable">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>入睡时间</th>
                            <th>起床时间</th>
                            <th>睡眠时长</th>
                            <th>睡眠质量</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 睡眠记录将通过JavaScript动态生成 -->
                    </tbody>
                </table>
            </section>
        </main>
        <!-- 底部图标导航栏 -->
        <footer class="footer">
            <nav class="navigation-links">
                <a href="index.html" class="nav-link">
                    <span class="nav-icon">📅</span>
                    <span class="nav-text">首页</span>
                </a>
                <a href="sleep.html" class="nav-link">
                    <span class="nav-icon">💤</span>
                    <span class="nav-text">睡眠记录</span>
                </a>
                <a href="diary.html" class="nav-link calendar-btn">
                    <span class="nav-icon">📔</span>
                    <span class="nav-text">日历</span>
                </a>
                <a href="tips.html" class="nav-link">
                    <span class="nav-icon">💡</span>
                    <span class="nav-text">Tips</span>
                </a>
                <a href="my.html" class="nav-link">
                    <span class="nav-icon">👤</span>
                    <span class="nav-text">我的</span>
                </a>
            </nav>
        </footer>
        
        <!-- 登录模态框 -->
        <div id="loginModal" class="modal">
            <div class="modal-content glass-effect auth-modal-content">
                <span class="close-modal">&times;</span>
                <h2>用户登录</h2>
                <form id="loginForm" class="auth-form">
                    <div class="auth-form-group">
                        <label for="loginUsername">用户名</label>
                        <input type="text" id="loginUsername" required>
                    </div>
                    <div class="auth-form-group">
                        <label for="loginPassword">密码</label>
                        <input type="password" id="loginPassword" required>
                    </div>
                    <button type="submit" class="auth-submit-btn">登录</button>
                </form>
                <div class="auth-switch">
                    还没有账号？ <a href="#" id="switchToRegister">立即注册</a>
                </div>
            </div>
        </div>
        
        <!-- 注册模态框 -->
        <div id="registerModal" class="modal">
            <div class="modal-content glass-effect auth-modal-content">
                <span class="close-modal">&times;</span>
                <h2>用户注册</h2>
                <form id="registerForm" class="auth-form">
                    <div class="auth-form-group">
                        <label for="registerUsername">用户名</label>
                        <input type="text" id="registerUsername" required>
                    </div>
                    <div class="auth-form-group">
                        <label for="registerPassword">密码</label>
                        <input type="password" id="registerPassword" required>
                    </div>
                    <div class="auth-form-group">
                        <label for="registerConfirmPassword">确认密码</label>
                        <input type="password" id="registerConfirmPassword" required>
                    </div>
                    <button type="submit" class="auth-submit-btn">注册</button>
                </form>
                <div class="auth-switch">
                    已有账号？ <a href="#" id="switchToLogin">立即登录</a>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 等待DOM加载完成
        document.addEventListener('DOMContentLoaded', () => {
            // 初始化页面
            initSleepApp();
            // 初始化用户认证
            initUserAuth();
        });
        
        // 用户认证相关函数
        function initUserAuth() {
            // 检查用户是否已登录
            checkUserStatus();
            
            // 添加事件监听
            addAuthEventListeners();
        }
        
        // 检查用户状态
        function checkUserStatus() {
            const currentUser = getCurrentUser();
            if (currentUser) {
                showUserStatus(currentUser);
            } else {
                showAuthButtons();
            }
        }
        
        // 添加认证事件监听
        function addAuthEventListeners() {
            // 登录/注册按钮事件
            const loginBtn = document.getElementById('loginBtn');
            const registerBtn = document.getElementById('registerBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            
            // 模态框切换事件
            const switchToRegister = document.getElementById('switchToRegister');
            const switchToLogin = document.getElementById('switchToLogin');
            
            // 登录/注册表单事件
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            
            // 登录按钮点击事件
            loginBtn.addEventListener('click', () => {
                showModal('loginModal');
            });
            
            // 注册按钮点击事件
            registerBtn.addEventListener('click', () => {
                showModal('registerModal');
            });
            
            // 退出登录按钮点击事件
            logoutBtn.addEventListener('click', () => {
                logout();
            });
            
            // 切换到注册模态框
            switchToRegister.addEventListener('click', (e) => {
                e.preventDefault();
                hideModal('loginModal');
                showModal('registerModal');
            });
            
            // 切换到登录模态框
            switchToLogin.addEventListener('click', (e) => {
                e.preventDefault();
                hideModal('registerModal');
                showModal('loginModal');
            });
            
            // 登录表单提交事件
            loginForm.addEventListener('submit', (e) => {
                e.preventDefault();
                handleLogin();
            });
            
            // 注册表单提交事件
            registerForm.addEventListener('submit', (e) => {
                e.preventDefault();
                handleRegister();
            });
        }
        
        // 显示模态框
        function showModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.style.display = 'flex';
        }
        
        // 隐藏模态框
        function hideModal(modalId) {
            const modal = document.getElementById(modalId);
            modal.style.display = 'none';
        }
        
        // 获取用户列表
        function getUsers() {
            const users = localStorage.getItem('users');
            return users ? JSON.parse(users) : [];
        }
        
        // 保存用户列表
        function saveUsers(users) {
            localStorage.setItem('users', JSON.stringify(users));
        }
        
        // 获取当前登录用户
        function getCurrentUser() {
            const currentUser = localStorage.getItem('currentUser');
            return currentUser ? JSON.parse(currentUser) : null;
        }
        
        // 设置当前登录用户
        function setCurrentUser(user) {
            localStorage.setItem('currentUser', JSON.stringify(user));
        }
        
        // 清除当前登录用户
        function clearCurrentUser() {
            localStorage.removeItem('currentUser');
        }
        
        // 显示用户状态
        function showUserStatus(user) {
            const userStatus = document.getElementById('userStatus');
            const authBtns = document.getElementById('authBtns');
            const usernameDisplay = document.getElementById('usernameDisplay');
            
            usernameDisplay.textContent = user.username;
            userStatus.style.display = 'flex';
            authBtns.style.display = 'none';
        }
        
        // 显示登录注册按钮
        function showAuthButtons() {
            const userStatus = document.getElementById('userStatus');
            const authBtns = document.getElementById('authBtns');
            
            userStatus.style.display = 'none';
            authBtns.style.display = 'flex';
        }
        
        // 处理用户登录
        function handleLogin() {
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            
            const users = getUsers();
            const user = users.find(u => u.username === username && u.password === password);
            
            if (user) {
                setCurrentUser(user);
                hideModal('loginModal');
                checkUserStatus();
                alert('登录成功！');
            } else {
                alert('用户名或密码错误！');
            }
        }
        
        // 处理用户注册
        function handleRegister() {
            const username = document.getElementById('registerUsername').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('registerConfirmPassword').value;
            
            if (password !== confirmPassword) {
                alert('两次输入的密码不一致！');
                return;
            }
            
            const users = getUsers();
            if (users.find(u => u.username === username)) {
                alert('该用户名已被注册！');
                return;
            }
            
            const newUser = {
                username,
                password
            };
            
            users.push(newUser);
            saveUsers(users);
            setCurrentUser(newUser);
            hideModal('registerModal');
            checkUserStatus();
            alert('注册成功！');
        }
        
        // 处理用户退出登录
        function logout() {
            clearCurrentUser();
            checkUserStatus();

        // 生成模拟睡眠数据（用于测试）
        function generateMockSleepData() {
            // 检查是否已有数据
            const existingRecords = JSON.parse(localStorage.getItem('sleepRecords') || '[]');
            if (existingRecords.length > 0) {
                return; // 已有数据，不覆盖
            }
            
            // 生成最近28天的数据
            const records = [];
            const today = new Date();
            
            // 不同睡眠模式的时间组合（用于生成更真实的分布）
            const sleepPatterns = [
                { sleep: '23:15', wake: '07:30', quality: 'excellent' },
                { sleep: '00:45', wake: '08:00', quality: 'good' },
                { sleep: '22:30', wake: '06:45', quality: 'excellent' },
                { sleep: '01:20', wake: '09:10', quality: 'fair' },
                { sleep: '23:45', wake: '07:20', quality: 'good' },
                { sleep: '22:50', wake: '07:05', quality: 'excellent' },
                { sleep: '00:15', wake: '08:30', quality: 'fair' }
            ];
            
            // 生成随机睡眠数据
            for (let i = 27; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                
                // 随机选择一个睡眠模式
                const patternIndex = Math.floor(Math.random() * sleepPatterns.length);
                const basePattern = sleepPatterns[patternIndex];
                
                // 添加随机波动（±30分钟）
                const randomSleepOffset = Math.floor(Math.random() * 60) - 30;
                const randomWakeOffset = Math.floor(Math.random() * 60) - 30;
                
                // 计算入睡时间
                const sleepTime = calculateTimeWithOffset(basePattern.sleep, randomSleepOffset);
                
                // 计算起床时间
                const wakeTime = calculateTimeWithOffset(basePattern.wake, randomWakeOffset);
                
                // 计算睡眠时长
                const [sleepHours, sleepMinutes] = sleepTime.split(':').map(Number);
                const [wakeHours, wakeMinutes] = wakeTime.split(':').map(Number);
                
                let totalMinutes = (wakeHours * 60 + wakeMinutes) - (sleepHours * 60 + sleepMinutes);
                if (totalMinutes < 0) {
                    totalMinutes += 24 * 60; // 跨越午夜
                }
                
                const hours = Math.floor(totalMinutes / 60);
                const minutes = totalMinutes % 60;
                
                // 生成记录
                records.push({
                    date: date.toISOString().split('T')[0],
                    sleepTime: sleepTime,
                    wakeTime: wakeTime,
                    duration: {
                        hours: hours,
                        minutes: minutes,
                        totalMinutes: totalMinutes
                    },
                    quality: basePattern.quality
                });
            }
            
            // 保存到localStorage（确保使用数组格式）
            localStorage.setItem('sleepRecords', JSON.stringify(records));
        }
        
        // 辅助函数：计算带偏移量的时间
        function calculateTimeWithOffset(baseTime, offsetMinutes) {
            const [hours, minutes] = baseTime.split(':').map(Number);
            const totalMinutes = hours * 60 + minutes + offsetMinutes;
            
            // 处理24小时制转换
            const newHours = Math.floor(totalMinutes / 60) % 24;
            const newMinutes = totalMinutes % 60;
            
            return `${newHours.toString().padStart(2, '0')}:${newMinutes.toString().padStart(2, '0')}`;
        }

        // 计算睡眠时长
        function calculateSleepDuration() {
            const sleepTimeInput = document.getElementById('sleepTime');
            const wakeTimeInput = document.getElementById('wakeTime');
            const durationValue = document.getElementById('durationValue');
            
            if (!sleepTimeInput.value || !wakeTimeInput.value) {
                durationValue.textContent = '--:--';
                return;
            }
            
            const date = document.getElementById('date').value;
            const today = new Date(date);
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);
            
            // 创建入睡时间和起床时间的Date对象
            const sleepTimeStr = sleepTimeInput.value.split(':');
            const wakeTimeStr = wakeTimeInput.value.split(':');
            
            const sleepTime = new Date(today);
            sleepTime.setHours(sleepTimeStr[0], sleepTimeStr[1], 0, 0);
            
            let wakeTime = new Date(today);
            wakeTime.setHours(wakeTimeStr[0], wakeTimeStr[1], 0, 0);
            
            // 如果起床时间早于入睡时间，认为是次日起床
            if (wakeTime <= sleepTime) {
                wakeTime = new Date(tomorrow);
                wakeTime.setHours(wakeTimeStr[0], wakeTimeStr[1], 0, 0);
            }
            
            // 计算睡眠时长（毫秒）
            const durationMs = wakeTime - sleepTime;
            const durationHours = Math.floor(durationMs / (1000 * 60 * 60));
            const durationMinutes = Math.floor((durationMs % (1000 * 60 * 60)) / (1000 * 60));
            
            // 格式化时间显示
            durationValue.textContent = `${durationHours.toString().padStart(2, '0')}:${durationMinutes.toString().padStart(2, '0')}`;
            
            return {
                hours: durationHours,
                minutes: durationMinutes,
                totalMinutes: durationHours * 60 + durationMinutes
            };
        }

        // 保存睡眠记录到localStorage
        function saveSleepRecord(record) {
            // 获取现有记录数组
            const sleepRecords = JSON.parse(localStorage.getItem('sleepRecords') || '[]');
            
            // 查找是否已存在该日期的记录
            const existingIndex = sleepRecords.findIndex(r => r.date === record.date);
            
            if (existingIndex >= 0) {
                // 更新现有记录
                sleepRecords[existingIndex] = record;
            } else {
                // 添加新记录

            }
            
            // 保存到localStorage
            localStorage.setItem('sleepRecords', JSON.stringify(sleepRecords));
        }

        // 更新睡眠时间段图表（从中午12点到次日中午12点）
        function updateSleepWakeChart(records) {
            const ctx = document.getElementById('sleepWakeChart').getContext('2d');

            if (window.sleepWakeChart && typeof window.sleepWakeChart.destroy === 'function') {
                window.sleepWakeChart.destroy();
            }

            const chartData = [];
            let chartMax = 24;

            function fmtTime(value) {
                const h = Math.floor(value) % 24;
                const m = Math.round((value - Math.floor(value)) * 60);
                return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
            }

            function shiftBy12(hourValue) {
                return (hourValue + 24 - 12) % 24;
            }

            const dateLabels = records.map(record => {
                const date = new Date(record.date);
                return date.toLocaleDateString('zh-CN', { month: '2-digit', day: '2-digit' });
            });

            records.forEach((record, idx) => {
                const [sleepH, sleepM] = record.sleepTime.split(':').map(Number);
                const [wakeH, wakeM] = record.wakeTime.split(':').map(Number);

                const sleepTime = sleepH + sleepM / 60;
                const wakeTime = wakeH + wakeM / 60;

                const yStart = shiftBy12(sleepTime);
                let yEnd = shiftBy12(wakeTime);

                if (wakeTime <= sleepTime) {
                    yEnd += 24;
                }

                chartData.push({
                    x: dateLabels[idx],
                    y: yEnd,
                    base: yStart,
                    originalStart: sleepTime,
                    originalEnd: wakeTime,
                    crossesMidnight: wakeTime <= sleepTime
                });

                chartMax = Math.max(chartMax, yEnd);
            });

            window.sleepWakeChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: dateLabels,
                    datasets: [{
                        label: '睡眠时间段',
                        data: chartData,
                        backgroundColor: 'rgba(100, 149, 237, 0.8)',
                        borderColor: 'rgba(100, 149, 237, 1)',
                        borderWidth: 1,
                        borderRadius: 4,
                        borderSkipped: false,
                        barThickness: 15
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.7)',
                            titleColor: '#e0e0e0',
                            bodyColor: '#e0e0e0',
                            callbacks: {
                                label: function(context) {
                                    const item = context.raw;
                                    const start = item.originalStart;
                                    const end = item.originalEnd;
                                    const isNextDay = item.crossesMidnight;
                                    const endLabel = isNextDay ? `${fmtTime(end)} (+1)` : fmtTime(end);
                                    return `睡眠时间段: ${fmtTime(start)} - ${endLabel}`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            min: 0,
                            max: Math.max(24, Math.ceil(chartMax + 2)),
                            ticks: {
                                color: '#e0e0e0',
                                stepSize: 2,
                                callback: function(value) {
                                    const clockHour = (value + 12) % 24;
                                    const dayOffset = value >= 24 ? ' (+1)' : '';
                                    return `${clockHour.toString().padStart(2, '0')}:00${dayOffset}`;
                                }
                            },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        },
                        x: {
                            ticks: { color: '#e0e0e0' },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' }
                        }
                    }
                }
            });
        }

            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .message-attachment {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem 0.6rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .message-attachment:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .message {
            max-width: 80%;
            padding: 0.8rem 1rem;
            border-radius: 18px;
            line-height: 1.4;
            animation: messageSlideIn 0.3s ease-out;
        }
        
        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            align-self: flex-end;
            background: var(--accent-blue-soft);
            color: white;
            border-bottom-right-radius: 6px;
        }
        
        .message.ai {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border-bottom-left-radius: 6px;
        }
        
        .message.typing {
            opacity: 0.7;
        }
        
        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            30% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .chat-input-area {
            padding: 1rem;
            border-top: 1px solid var(--card-border);
            background: rgba(32, 38, 54, 0.9);
            border-radius: 0 0 12px 12px;
        }
        
        .chat-input-container {
            display: flex;
            gap: 0.5rem;
        }
        
        #chat-input {
            flex: 1;
            padding: 0.8rem 1rem;
            background: var(--form-bg);
            border: 1px solid rgba(101, 115, 255, 0.2);
            border-radius: 20px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            resize: none;
            min-height: 40px;
            max-height: 120px;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        #chat-input::-webkit-scrollbar {
            display: none;
        }
        
        #chat-input:focus {
            outline: none;
            border-color: var(--accent-blue-soft);
            background: rgba(45, 55, 72, 0.9);
            box-shadow: 0 0 0 3px rgba(100, 149, 237, 0.15);
        }
        
        #send-btn {
            background: var(--accent-blue-soft);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        
        #send-btn:hover {
            background: rgba(100, 149, 237, 0.8);
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(100, 149, 237, 0.3);
        }
        
        #send-btn:active {
            transform: scale(0.95);
        }
        
        /* 关闭按钮 */
        .close-chat-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.3rem;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        
        .close-chat-btn:hover {
            color: var(--accent-blue-soft);
            background: rgba(255, 255, 255, 0.1);
        }
        
        /* 欢迎消息样式 */
        .welcome-message {
            text-align: center;
            margin: 2rem 1rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        
        /* 响应式设计 */
        @media (max-width: 480px) {
            .chat-container {
                width: calc(100% - 40px);
                height: 500px;
                bottom: 70px;
                right: 20px;
            }
            
            .chat-bubble-btn {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
        }
    </style>
    
    <!-- 聊天气泡按钮 -->
    <button class="chat-bubble-btn" id="chat-bubble-btn">💬</button>
    
    <!-- AI聊天界面 -->
    <div class="chat-container" id="chat-container">
        <div class="chat-header">
            <h2>AI助手</h2>
            <button class="close-chat-btn" id="close-chat-btn">&times;</button>
        </div>
        
        <div class="chat-messages" id="chat-messages">
            <div class="welcome-message">
                <p>你好！我是你的AI助手，有什么关于偏头痛或睡眠的问题可以问我。</p>
            </div>
        </div>
        
        <div class="chat-input-area">
            <div class="chat-input-container">
                <input type="file" id="file-input" multiple accept="image/*,.pdf,.doc,.docx,.txt">
                <button class="attachment-btn" id="attachment-btn" title="添加附件">📎</button>
                <div class="chat-input-wrapper">
                    <div id="attachment-preview" class="attachment-preview" style="display: none;"></div>
                    <textarea id="chat-input" placeholder="输入你的问题..." rows="1"></textarea>
                </div>
                <button id="send-btn">➤</button>
            </div>
        </div>
    </div>
    
    <script src="ai-chat.js"></script>
</body>
</html>
