<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI助手</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* AI聊天界面样式 */
        .chat-container {
            max-width: 400px;
            height: 600px;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            position: fixed;
            bottom: 80px;
            right: 20px;
            z-index: 1500;
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.3s ease;
        }
        
        .chat-container.visible {
            opacity: 1;
            transform: scale(1);
        }
        
        .chat-header {
            padding: 1rem;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(26, 32, 44, 0.8);
            border-radius: 12px 12px 0 0;
        }
        
        .chat-header h2 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .chat-messages {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* Internet Explorer 10+ */
        }

        .chat-messages::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
        }
        
        .message {
            max-width: 80%;
            padding: 0.8rem 1rem;
            border-radius: 18px;
            line-height: 1.4;
            animation: messageSlideIn 0.3s ease-out;
        }
        
        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            align-self: flex-end;
            background: #6495ed;
            color: white;
            border-bottom-right-radius: 6px;
        }
        
        .message.ai {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border-bottom-left-radius: 6px;
        }
        
        .message.typing {
            opacity: 0.7;
        }
        
        .typing-indicator {
            display: flex;
            gap: 4px;
            align-items: center;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% {
                transform: scale(0.8);
                opacity: 0.5;
            }
            30% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .api-key-config {
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(28, 38, 52, 0.75);
        }

        .api-key-config input {
            flex: 1;
            padding: 0.5rem;
            border-radius: 8px;
            border: 1px solid var(--glass-border);
            background: rgba(20, 31, 45, 0.8);
            color: var(--text-primary);
        }

        .api-key-config button {
            padding: 0.5rem 0.8rem;
            border-radius: 8px;
            border: none;
            background: var(--accent-blue);
            color: white;
            cursor: pointer;
        }

        .chat-input-area {
            padding: 1rem;
            border-top: 1px solid var(--glass-border);
            background: rgba(26, 32, 44, 0.8);
            border-radius: 0 0 12px 12px;
        }
        
        .chat-input-container {
            display: flex;
            gap: 0.5rem;
            align-items: flex-end;
        }

        .chat-input-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .attachment-preview {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0.5rem;
            background: rgba(30, 30, 30, 0.5);
            border-radius: 8px;
            max-height: 100px;
            overflow-y: auto;
        }

        .attachment-item {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem 0.6rem;
            background: rgba(100, 149, 237, 0.2);
            border-radius: 15px;
            font-size: 0.8rem;
            color: var(--text-primary);
        }

        .attachment-item .remove-attachment {
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1;
        }

        .attachment-item .remove-attachment:hover {
            color: var(--migraine-red);
        }

        .attachment-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.5rem;
            border-radius: 50%;
            transition: all 0.3s ease;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .attachment-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--accent-blue-light);
        }

        #file-input {
            display: none;
        }

        .message-attachments {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .message-attachment {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem 0.6rem;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .message-attachment:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        #chat-input {
            flex: 1;
            padding: 0.8rem 1rem;
            background: rgba(30, 30, 30, 0.7);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            resize: none;
            min-height: 40px;
            max-height: 120px;
            overflow-y: auto;
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* Internet Explorer 10+ */
        }

        #chat-input::-webkit-scrollbar {
            display: none; /* Chrome, Safari, Opera */
        }
        
        #chat-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px rgba(30, 136, 229, 0.2);
        }
        
        #send-btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        
        #send-btn:hover {
            background: var(--accent-blue-hover);
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(65, 105, 225, 0.3);
        }
        
        #send-btn:active {
            transform: scale(0.95);
        }
        
        /* 聊天气泡按钮 */
        .chat-bubble-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: var(--accent-blue);
            border: none;
            border-radius: 50%;
            box-shadow: 0 4px 12px rgba(91, 118, 196, 0.3);
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1400;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat-bubble-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 16px rgba(90, 124, 228, 0.4);
        }
        
        .chat-bubble-btn:active {
            transform: scale(0.95);
        }
        
        /* 关闭按钮 */
        .close-chat-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 0.3rem;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        
        .close-chat-btn:hover {
            color: var(--accent-blue);
            background: rgba(255, 255, 255, 0.1);
        }
        
        /* 欢迎消息样式 */
        .welcome-message {
            text-align: center;
            margin: 2rem 1rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        /* 响应式设计 */
        @media (max-width: 480px) {
            .chat-container {
                width: calc(100% - 40px);
                height: 500px;
                bottom: 70px;
                right: 20px;
            }
            
            .chat-bubble-btn {
                width: 50px;
                height: 50px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <!-- 聊天气泡按钮 -->
    <button class="chat-bubble-btn" id="chat-bubble-btn">💬</button>
    
    <!-- AI聊天界面 -->
    <div class="chat-container" id="chat-container">
        <div class="chat-header">
            <h2>AI助手</h2>
            <button class="close-chat-btn" id="close-chat-btn">&times;</button>
        </div>
        <div class="api-key-config">
            <input id="deepseek-api-key-input" type="password" placeholder="输入 DeepSeek API Key" aria-label="DeepSeek API Key" />
            <button id="save-api-key-btn">保存 API Key</button>
        </div>
        
        <div class="chat-messages" id="chat-messages">
            <div class="welcome-message">
                <p>你好！我是你的AI助手，有什么关于偏头痛的问题可以问我。</p>
            </div>
        </div>
        
        <div class="chat-input-area">
            <div class="chat-input-container">
                <input type="file" id="file-input" multiple accept="image/*,.pdf,.doc,.docx,.txt">
                <button class="attachment-btn" id="attachment-btn" title="添加附件">📎</button>
                <div class="chat-input-wrapper">
                    <div id="attachment-preview" class="attachment-preview" style="display: none;"></div>
                    <textarea id="chat-input" placeholder="输入你的问题..." rows="1"></textarea>
                </div>
                <button id="send-btn">➤</button>
            </div>
        </div>
    </div>
    
    <script src="ai-chat.js"></script>
</body>
</html>
